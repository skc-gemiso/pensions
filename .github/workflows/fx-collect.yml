name: FX Rate Collect

on:
  schedule:
    - cron: '0 0 * * *'  # 매일 09:00 KST (00:00 UTC)
  workflow_dispatch:      # 수동 실행 가능

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: collector/usa/requirements.txt

      - name: Install Python dependencies
        run: pip install -r collector/usa/requirements.txt

      - name: Run FX rate collector
        env:
          PENSION_SIM_DB_HOST: ${{ secrets.PENSION_SIM_DB_HOST }}
          PENSION_SIM_DB_PORT: ${{ secrets.PENSION_SIM_DB_PORT }}
          PENSION_SIM_DB_NAME: ${{ secrets.PENSION_SIM_DB_NAME }}
          PENSION_SIM_DB_USER: ${{ secrets.PENSION_SIM_DB_USER }}
          PENSION_SIM_DB_PASSWORD: ${{ secrets.PENSION_SIM_DB_PASSWORD }}
        run: python main.py --only fx
        working-directory: collector/usa
