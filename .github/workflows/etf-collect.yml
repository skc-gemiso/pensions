name: ETF Holdings Collect

on:
  schedule:
    - cron: '0 0 * * *'  # 매일 09:00 KST (00:00 UTC)
  workflow_dispatch:      # GitHub Actions 탭에서 수동 실행 가능

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: collector/etf/requirements.txt

      - name: Install Python dependencies
        run: pip install -r collector/etf/requirements.txt

      - name: Install Playwright Chromium
        run: playwright install chromium --with-deps

      - name: Run ETF collector
        env:
          PENSION_SIM_DB_HOST: ${{ secrets.PENSION_SIM_DB_HOST }}
          PENSION_SIM_DB_PORT: ${{ secrets.PENSION_SIM_DB_PORT }}
          PENSION_SIM_DB_NAME: ${{ secrets.PENSION_SIM_DB_NAME }}
          PENSION_SIM_DB_USER: ${{ secrets.PENSION_SIM_DB_USER }}
          PENSION_SIM_DB_PASSWORD: ${{ secrets.PENSION_SIM_DB_PASSWORD }}
        run: python fetch_holdings.py
        working-directory: collector/etf
